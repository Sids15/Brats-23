# BraTS-Trust global protocol (roadmap S9 'Global protocol, non-negotiable').
# Design frozen. Override per-experiment with a small YAML that is deep-merged
# over this file (see brats_trust.config.load_config).

seed: 42
# Seed budgets (roadmap S4.2): >=3 exploration, >=5 confirmatory (Probe 3 sweep).
seeds_exploration: [42, 43, 44]
seeds_confirmatory: [42, 43, 44, 45, 46]

data:
  # Path on the TRAINING machine. Override on each host.
  root: "D:/brats/ASNR-MICCAI-BraTS2023-GLI-Challenge-TrainingData"
  cohort: "BraTS2023-GLI"
  file_ext: ".nii"            # this dataset ships uncompressed .nii (not .nii.gz)
  case_glob: "BraTS-GLI-*"
  channel_order: ["FLAIR", "T1", "T1CE", "T2"]   # frozen; see constants.py
  modality_suffix: { FLAIR: "t2f", T1: "t1n", T1CE: "t1c", T2: "t2w" }
  seg_suffix: "seg"
  # Patient-level splits saved to disk, zero leakage (roadmap S9). Splits are
  # keyed by patient id (BraTS-GLI-XXXXX) so longitudinal -000/-001 stay together.
  splits_path: "splits/gli_splits.json"
  split_fractions: { train: 0.8, val: 0.1, test: 0.1 }

preprocess:
  brain_crop: true                 # crop to nonzero brain bbox (roadmap S9)
  normalize: "per_channel_zscore"  # z-score over nonzero voxels, per channel
  target_spacing: null             # BraTS is 1mm iso + co-registered already

regions:                # overlapping output channels (roadmap S9)
  WT: [1, 2, 3]
  TC: [1, 3]
  ET: [3]

model:
  name: "unet3d"            # shared scaffold (models/unet3d.py)
  block: "conv"             # pluggable block: conv | dwsep (RF probe, S4)
  features: [32, 64, 128, 256]
  kernel_size: 3

train:
  patch_size: [128, 128, 128]
  batch_size: 2
  loss: "DiceCE"
  optimizer: "AdamW"
  lr: 0.0003
  weight_decay: 0.00001
  max_epochs: 300
  val_interval: 5           # run validation every N epochs
  log_every_steps: 25       # periodic per-step line in run.log/terminal; 0 disables
  amp: true                 # mixed precision (24 GB RTX 4500 Ada target); auto-off on CPU
  num_workers: 8
  modality_dropout:         # roadmap S6 (optional fix): mean-fill a random modality late in training
    enabled: false
    prob: 0.25
    start_frac: 0.8         # only the last 20% of epochs

inference:                  # roadmap S9: sliding window + Gaussian stitch + TTA + CCA
  sliding_window: true
  roi_size: [128, 128, 128]
  sw_batch_size: 2
  overlap: 0.5
  blend: "gaussian"
  tta: true
  cca: true                 # connected-component analysis post-processing

ablation:                   # roadmap S3.1: mean-fill, NOT zero-fill
  fill: "mean"              # one of: mean | healthy_prior | zero
  report_zero_fill_sensitivity: true

stats:                      # roadmap S3 / S4.2
  effect_sizes: true
  confidence_intervals: true
  multiple_comparison_correction: "holm"

physics_key: "src/brats_trust/physics_answer_key.json"
